name: Build Blob Caller Workflow

on:
  workflow_dispatch:
  # push:
  #   branches: ['**']
  #   paths-ignore:
  #     - .github/workflows/wf-slack-alert.yaml
  #     - README.md
  #     - renovate.json

concurrency:
  # serialize main pushes so back-to-back releases don't race the cut;
  # never cancel a run mid-publish (rw-release isn't idempotent-resume)
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-blob:
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-blob.yaml@b4bd382c96c2cf26cbcd5aedd994fde3abf818d0 # v0.31.4
    secrets: inherit
    with:
      subject-path: |
        i_am_blob
        i_am_another_blob
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@b4bd382c96c2cf26cbcd5aedd994fde3abf818d0 # v0.31.4
      # keep the example run advisory so a demo FAILED VSA is surfaced without
      # breaking the run; the FAILED VSA is still attested and uploaded.
      allow-failed-vsa: true
