name: Build Blob Caller Workflow

on:
  workflow_dispatch:
  # push:
  #   branches: ['**']
  #   paths-ignore:
  #     - .github/workflows/wf-slack-alert.yaml
  #     - README.md
  #     - catalog-info.yaml
  #     - renovate.json

permissions: {}

jobs:
  attest-blob-hp: #blob
    permissions:
      id-token: write
      attestations: write
      contents: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-build-blob.yaml@41ca57076a9811129dde9a00aa544ae649208208 # v0.20.17
    secrets: inherit
    with:
      subject-path: |
        i_am_blob
        i_am_another_blob
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-attest-blob.yaml@41ca57076a9811129dde9a00aa544ae649208208 # v0.20.17

  attest-blob-lp: #blob
    permissions:
      id-token: write
      attestations: write
      contents: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-lp-build-blob.yaml@41ca57076a9811129dde9a00aa544ae649208208 # v0.20.17
    secrets: inherit
    with:
      subject-path: |
        i_am_blob
        i_am_another_blob
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-lp-attest-blob.yaml@41ca57076a9811129dde9a00aa544ae649208208 # v0.20.17
