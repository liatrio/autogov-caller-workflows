name: Build Blob Caller Workflow

on:
  workflow_dispatch:
  # push:
  #   branches: ['**']
  #   paths-ignore:
  #     - .github/workflows/wf-slack-alert.yaml
  #     - README.md
  #     - renovate.json

permissions: {}

jobs:
  build-blob:
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-blob.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0
    secrets: inherit
    with:
      subject-path: |
        i_am_blob
        i_am_another_blob
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0
