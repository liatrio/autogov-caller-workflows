name: Build Image Caller Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - catalog-info.yaml
      - renovate.json
  pull_request:
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - catalog-info.yaml
      - renovate.json

permissions: {}

jobs:
  attest-image-hp: #image
    permissions:
      actions: read
      id-token: write
      attestations: write
      packages: write
      contents: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-build-image.yaml@37ae31c90a1df2ae181c73e1519603abe3ab5130 # v0.8.3
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-attest-image.yaml@37ae31c90a1df2ae181c73e1519603abe3ab5130 # v0.8.3
