name: Build Image Caller Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - renovate.json
  pull_request:
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - renovate.json

concurrency:
  # serialize main pushes so back-to-back releases don't race the cut;
  # never cancel a run mid-publish (rw-release isn't idempotent-resume)
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-image:
    permissions:
      actions: read
      id-token: write
      attestations: write
      packages: write
      contents: write
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-image.yaml@b2aa95259a872fc00b0fb65890ce3dba2aedaecf # v0.31.2
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-image.yaml@b2aa95259a872fc00b0fb65890ce3dba2aedaecf # v0.31.2
      # keep the example run advisory so a demo FAILED VSA is surfaced without
      # breaking the run; the FAILED VSA is still attested and uploaded.
      allow-failed-vsa: true
