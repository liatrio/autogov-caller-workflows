name: Build Image Caller Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - renovate.json
  pull_request:
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - renovate.json

permissions: {}

jobs:
  build-image:
    permissions:
      actions: read
      id-token: write
      attestations: write
      packages: write
      contents: write
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-image.yaml@fcc19b17d1453b2172ca012719da4c8663652514 # v0.27.0
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-image.yaml@fcc19b17d1453b2172ca012719da4c8663652514 # v0.27.0
      # keep the example run advisory so a demo FAILED VSA is surfaced without
      # breaking the run; the FAILED VSA is still attested and uploaded.
      allow-failed-vsa: true
