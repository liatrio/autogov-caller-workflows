name: Build Image Caller Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - catalog-info.yaml
      - renovate.json
  pull_request:
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - catalog-info.yaml
      - renovate.json

permissions: {}

jobs:
  build-image:
    permissions:
      actions: read
      id-token: write
      attestations: write
      packages: write
      contents: write
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-image.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-image.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
